<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divya's Song</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            text-align: center;
        }
        h1 {
            margin: 0;
        }
        h2 {
            color: #777;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Divya's Song</h1>
        <h2>You sang something beautiful, so I built something for you.</h2>
        <audio controls>
            <source src="audio.mp4" type="audio/mp4">
            Your browser does not support the audio element.
        </audio>
    </div>
</body>
</html>
